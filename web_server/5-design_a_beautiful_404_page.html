<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 – Unf41r</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream:   #f5efe0;
      --blush:   #e8a598;
      --dusty:   #c5b8a8;
      --sage:    #7a9e7e;
      --mustard: #d4a843;
      --wine:    #7c3c3c;
      --navy:    #2c3e5a;
      --brown:   #5a3e2b;
      --pink:    #e8c4b8;
      --stripe:  #e8d5c4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--cream);
      color: var(--brown);
      font-family: 'Courier Prime', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      cursor: default;
    }

    /* Wes Anderson wallpaper stripes */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 38px,
        var(--stripe) 38px,
        var(--stripe) 40px
      );
      opacity: 0.5;
      z-index: 0;
    }

    /* Soft vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(90,62,43,0.15) 100%);
      pointer-events: none;
      z-index: 50;
    }

    /* ── FRAME ── */
    .frame {
      position: relative;
      z-index: 10;
      width: min(680px, 92vw);
      background: var(--cream);
      border: 3px solid var(--brown);
      box-shadow:
        6px 6px 0 var(--brown),
        12px 12px 0 var(--blush);
      animation: frameIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes frameIn {
      from { opacity: 0; transform: scale(0.92) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Top ribbon */
    .ribbon {
      background: var(--navy);
      color: var(--cream);
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-align: center;
      padding: 0.45rem 1rem;
      border-bottom: 3px solid var(--brown);
    }

    /* Mustard accent bar */
    .accent-bar {
      height: 8px;
      background: repeating-linear-gradient(
        90deg,
        var(--mustard) 0px,   var(--mustard) 20px,
        var(--wine)    20px,  var(--wine)    40px,
        var(--sage)    40px,  var(--sage)    60px,
        var(--blush)   60px,  var(--blush)   80px
      );
      border-bottom: 2px solid var(--brown);
    }

    /* Main content */
    .content {
      padding: 2.5rem 3rem 2rem;
      text-align: center;
    }

    .label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--wine);
      opacity: 0;
      animation: fadeUp 0.5s ease 0.3s forwards;
      margin-bottom: 0.6rem;
    }

    /* Giant 404 */
    .big-404 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(6rem, 22vw, 11rem);
      line-height: 1;
      color: var(--navy);
      position: relative;
      display: inline-block;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.15s forwards;
      letter-spacing: -2px;
    }

    .big-404::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 10%;
      width: 80%;
      height: 4px;
      background: var(--mustard);
      border-radius: 2px;
      transform: rotate(-1deg);
    }

    /* UNF41R stamp */
    .stamp {
      display: inline-block;
      margin-top: 1.8rem;
      padding: 0.3rem 1rem;
      border: 3px solid var(--wine);
      color: var(--wine);
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 3vw, 1.4rem);
      letter-spacing: 0.06em;
      transform: rotate(-2deg);
      opacity: 0;
      animation: stampIn 0.4s cubic-bezier(0.22,1,0.36,1) 0.6s forwards;
    }

    .stamp .highlight {
      color: var(--navy);
      font-weight: 700;
      font-style: normal;
    }

    @keyframes stampIn {
      from { opacity: 0; transform: rotate(-2deg) scale(1.3); }
      to   { opacity: 1; transform: rotate(-2deg) scale(1); }
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 1.6rem auto;
      width: 70%;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.8s forwards;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--dusty);
    }

    .divider-icon { color: var(--mustard); font-size: 1rem; }

    /* Magritte line */
    .magritte {
      font-family: 'Courier Prime', monospace;
      font-style: italic;
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: var(--brown);
      letter-spacing: 0.04em;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.95s forwards;
    }

    .magritte em {
      color: var(--sage);
      font-style: normal;
      font-weight: bold;
    }

    .subtitle {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dusty);
      margin-top: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.5s ease 1.1s forwards;
    }

    /* Button */
    .btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.65rem 2rem;
      background: var(--navy);
      color: var(--cream);
      font-family: 'Courier Prime', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      border: 2px solid var(--navy);
      opacity: 0;
      animation: fadeUp 0.5s ease 1.25s forwards;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .btn:hover {
      background: var(--mustard);
      border-color: var(--mustard);
      color: var(--brown);
    }

    /* Bottom ribbon */
    .bottom-ribbon {
      background: var(--blush);
      border-top: 3px solid var(--brown);
      padding: 0.5rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--wine);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--wine);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Corner rosettes */
    .rosette {
      position: fixed;
      width: 64px;
      height: 64px;
      opacity: 0.13;
      z-index: 5;
    }
    .rosette--tl { top: 16px; left: 16px; }
    .rosette--tr { top: 16px; right: 16px; transform: scaleX(-1); }
    .rosette--bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
    .rosette--br { bottom: 16px; right: 16px; transform: scale(-1); }

    /* Drifting ornaments */
    .birds { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
    .bird {
      position: absolute;
      opacity: 0.1;
      animation: drift linear infinite;
      color: var(--brown);
      font-size: 0.9rem;
    }
    @keyframes drift {
      from { transform: translateX(-60px); }
      to   { transform: translateX(110vw); }
    }
  </style>
</head>
<body>

  <!-- Corner rosettes -->
  <div class="rosette rosette--tl">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="30" stroke="#5a3e2b" stroke-width="1.5"/>
      <circle cx="32" cy="32" r="21" stroke="#5a3e2b" stroke-width="1"/>
      <circle cx="32" cy="32" r="12" stroke="#5a3e2b" stroke-width="1"/>
      <line x1="2" y1="32" x2="62" y2="32" stroke="#5a3e2b" stroke-width="1"/>
      <line x1="32" y1="2" x2="32" y2="62" stroke="#5a3e2b" stroke-width="1"/>
      <line x1="10" y1="10" x2="54" y2="54" stroke="#5a3e2b" stroke-width="0.8"/>
      <line x1="54" y1="10" x2="10" y2="54" stroke="#5a3e2b" stroke-width="0.8"/>
    </svg>
  </div>
  <div class="rosette rosette--tr">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="30" stroke="#5a3e2b" stroke-width="1.5"/>
      <circle cx="32" cy="32" r="21" stroke="#5a3e2b" stroke-width="1"/>
      <circle cx="32" cy="32" r="12" stroke="#5a3e2b" stroke-width="1"/>
      <line x1="2" y1="32" x2="62" y2="32" stroke="#5a3e2b" stroke-width="1"/>
      <line x1="32" y1="2" x2="32" y2="62" stroke="#5a3e2b" stroke-width="1"/>
      <line x1="10" y1="10" x2="54" y2="54" stroke="#5a3e2b" stroke-width="0.8"/>
      <line x1="54" y1="10" x2="10" y2="54" stroke="#5a3e2b" stroke-width="0.8"/>
    </svg>
  </div>
  <div class="rosette rosette--bl">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="30" stroke="#5a3e2b" stroke-width="1.5"/>
      <circle cx="32" cy="32" r="21" stroke="#5a3e2b" stroke-width="1"/>
      <circle cx="32" cy="32" r="12" stroke="#5a3e2b" stroke-width="1"/>
      <line x1="2" y1="32" x2="62" y2="32" stroke="#5a3e2b" stroke-width="1"/>
      <line x1="32" y1="2" x2="32" y2="62" stroke="#5a3e2b" stroke-width="1"/>
      <line x1="10" y1="10" x2="54" y2="54" stroke="#5a3e2b" stroke-width="0.8"/>
      <line x1="54" y1="10" x2="10" y2="54" stroke="#5a3e2b" stroke-width="0.8"/>
    </svg>
  </div>
  <div class="rosette rosette--br">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="30" stroke="#5a3e2b" stroke-width="1.5"/>
      <circle cx="32" cy="32" r="21" stroke="#5a3e2b" stroke-width="1"/>
      <circle cx="32" cy="32" r="12" stroke="#5a3e2b" stroke-width="1"/>
      <line x1="2" y1="32" x2="62" y2="32" stroke="#5a3e2b" stroke-width="1"/>
      <line x1="32" y1="2" x2="32" y2="62" stroke="#5a3e2b" stroke-width="1"/>
      <line x1="10" y1="10" x2="54" y2="54" stroke="#5a3e2b" stroke-width="0.8"/>
      <line x1="54" y1="10" x2="10" y2="54" stroke="#5a3e2b" stroke-width="0.8"/>
    </svg>
  </div>

  <div class="birds" id="birds"></div>

  <div class="frame">
    <div class="ribbon">✦ &nbsp; The Grand Web Establishment &nbsp; ✦</div>
    <div class="accent-bar"></div>

    <div class="content">
      <p class="label">Error Report · Room 404</p>
      <div class="big-404">404</div>

      <div class="stamp">
        How terribly <span class="highlight">unf41r</span>, mon ami.
      </div>

      <div class="divider">
        <span class="divider-icon">✦</span>
      </div>

      <p class="magritte">Ceci n'est pas une page.</p>
      <p class="subtitle">The page you requested does not exist</p>

      <a href="/" class="btn">← Return to Lobby</a>
    </div>

    <div class="bottom-ribbon">
      <span>Est. HTTP/1.1</span>
      <span class="dot"></span>
      <span>Status · Not Found</span>
    </div>
  </div>

  <script>
    const birdsContainer = document.getElementById('birds');
    const chars = ['✦', '◆', '❧', '✿', '❦', '◈'];
    for (let i = 0; i < 14; i++) {
      const b = document.createElement('div');
      b.className = 'bird';
      b.textContent = chars[Math.floor(Math.random() * chars.length)];
      b.style.top = (Math.random() * 92) + 'vh';
      b.style.animationDuration = (18 + Math.random() * 22) + 's';
      b.style.animationDelay = (Math.random() * 16) + 's';
      b.style.fontSize = (0.5 + Math.random() * 0.9) + 'rem';
      birdsContainer.appendChild(b);
    }
  </script>
</body>
</html>
